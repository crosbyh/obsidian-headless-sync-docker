services:
  obsidian-sync:
    image: ghcr.io/${GHCR_REPO:-crosbyh/obsidian-headless-sync-docker}:latest
    container_name: obsidian-sync
    environment:
      # Required
      OBSIDIAN_AUTH_TOKEN: ${OBSIDIAN_AUTH_TOKEN}
      VAULT_NAME: ${VAULT_NAME}
      # Required if vault uses end-to-end encryption
      VAULT_PASSWORD: ${VAULT_PASSWORD:-}
      # File ownership: set to UID:GID of the host user who should own vault files.
      # Regular Docker : PUID=$(id -u)  PGID=$(id -g)  of your host user
      # Rootless Docker: PUID=0  PGID=0  (container root maps to the rootless host user)
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      # Optional overrides
      VAULT_PATH: ${VAULT_PATH:-/vault}
      DEVICE_NAME: ${DEVICE_NAME:-obsidian-docker}
      CONFLICT_STRATEGY: ${CONFLICT_STRATEGY:-merge}
      EXCLUDED_FOLDERS: ${EXCLUDED_FOLDERS:-}
      FILE_TYPES: ${FILE_TYPES:-}
    volumes:
      - ${VAULT_HOST_PATH:-./vault}:/vault
    restart: unless-stopped
